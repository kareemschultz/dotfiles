# ── Starship prompt ───────────────────────────────────────────────────────────
# Managed by chezmoi — edit with: chezmoi edit --apply ~/.config/starship.toml
# Cross-platform: works on Zsh (macOS/Linux) and PowerShell (Windows)
# Test: starship explain | starship timings

add_newline    = true
command_timeout = 1000   # ms before a module is dropped

palette = "catppuccin_mocha"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"

# ── Prompt layout ─────────────────────────────────────────────────────────────
format = """\
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$rust\
$golang\
$docker_context\
$kubernetes\
$cmd_duration\
$line_break\
$character\
"""

right_format = "$time$battery"

# ── Modules ───────────────────────────────────────────────────────────────────
[os]
disabled = false
style    = "bg:surface0 fg:text bold"

[os.symbols]
Macos   = " "
Linux   = " "
Windows = " "
Unknown = " "

[username]
show_always = true
style_user  = "bg:surface0 fg:text"
style_root  = "bg:red fg:base bold"
format      = "[ $user ]($style)"

[hostname]
ssh_only  = true
style     = "bg:surface0 fg:peach"
format    = "[@$hostname ]($style)"

[directory]
style                     = "bg:blue fg:base bold"
format                    = "[ $path ]($style)"
truncation_length         = 3
truncate_to_repo          = true
read_only                 = " 󰌾"
read_only_style           = "bg:blue fg:base"

[git_branch]
symbol = " "
style  = "bg:mauve fg:base"
format = "[ $symbol$branch ]($style)"

[git_status]
style      = "bg:mauve fg:base"
format     = "[$all_status$ahead_behind ]($style)"
staged     = "[+$count](green)"
modified   = "[~$count](yellow)"
untracked  = "[?$count](red)"
deleted    = "[-$count](red)"
ahead      = "⇡$count"
behind     = "⇣$count"
diverged   = "⇡$ahead_count⇣$behind_count"
conflicted = "[=$count](red)"

[nodejs]
symbol = " "
style  = "fg:green"
format = "[ $symbol$version ]($style)"
detect_files = ["package.json", ".nvmrc", ".node-version"]

[python]
symbol = " "
style  = "fg:yellow"
format = "[ $symbol$version ]($style)"

[rust]
symbol = " "
style  = "fg:peach"
format = "[ $symbol$version ]($style)"

[golang]
symbol = " "
style  = "fg:sky"
format = "[ $symbol$version ]($style)"

[docker_context]
symbol = " "
style  = "fg:sky"
format = "[ $symbol$context ]($style)"
only_with_files = true

[kubernetes]
disabled = false
style    = "fg:blue"
format   = "[ ☸ $context\\($namespace\\) ]($style)"
detect_files = ["k8s", "*.yaml", "*.yml"]

[cmd_duration]
min_time         = 2000
style            = "fg:yellow"
format           = "[ ⏱ $duration]($style) "
show_milliseconds = false

[time]
disabled    = false
style       = "fg:subtext1"
format      = "[$time]($style) "
time_format = "%H:%M"

[battery]
disabled = false
format   = "[$symbol$percentage]($style) "

[[battery.display]]
threshold = 20
style     = "bold fg:red"
discharging_symbol = "󰁺 "

[[battery.display]]
threshold = 50
style     = "fg:yellow"
discharging_symbol = "󰁿 "

[[battery.display]]
threshold = 100
style     = "fg:green"
discharging_symbol = "󰁹 "

[character]
success_symbol = "[❯](bold fg:green)"
error_symbol   = "[❯](bold fg:red)"
vimcmd_symbol  = "[❮](bold fg:mauve)"
