# ── tmux.conf ─────────────────────────────────────────────────────────────────
# Managed by chezmoi — edit with: chezmoi edit --apply ~/.config/tmux/tmux.conf
# After changes: prefix + r  (reload) or: tmux source ~/.config/tmux/tmux.conf

# ── Prefix: Ctrl+A (like screen, friendlier than Ctrl+B) ─────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Core ──────────────────────────────────────────────────────────────────────
set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 50000
set -sg escape-time 0           # Remove ESC delay (critical for Neovim)
set -g focus-events on          # Enable focus events (used by Neovim autoread)
set -g base-index 1             # Windows start at 1 (not 0)
setw -g pane-base-index 1       # Panes start at 1
set -g renumber-windows on      # Renumber windows when one is closed
set -g status-position top      # Status bar at top

# ── Reload config ─────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded ✓"

# ── Splits (intuitive: | = vertical split, - = horizontal split) ─────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── New window in current path ────────────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"

# ── Vim-style pane navigation ─────────────────────────────────────────────────
# Works seamlessly with vim-tmux-navigator in Neovim
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind -n C-\\ if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'

# ── Pane resize ───────────────────────────────────────────────────────────────
bind -n M-Left  resize-pane -L 3
bind -n M-Right resize-pane -R 3
bind -n M-Up    resize-pane -U 3
bind -n M-Down  resize-pane -D 3

# ── Window navigation ─────────────────────────────────────────────────────────
bind -n S-Left  previous-window
bind -n S-Right next-window

# ── Session manager with sesh ─────────────────────────────────────────────────
# Ctrl+A Ctrl+J: fuzzy-pick any session, zoxide dir, or git repo
bind C-j display-popup -E -w 60% -h 60% \
    "sesh connect \$(sesh list -i | gum filter --limit 1 --fuzzy --no-sort \
    --placeholder 'Jump to...' --prompt '⚡ ' --height 20)"

# ── Copy mode (vim keys) ──────────────────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# ── Plugins (TPM) ────────────────────────────────────────────────────────────
# Install TPM: run_once_after_03-install-tpm.sh handles this
# Install plugins: prefix + I
# Update plugins:  prefix + U
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'      # Sane defaults
set -g @plugin 'catppuccin/tmux#v2.1.3'           # Catppuccin Mocha theme
set -g @plugin 'tmux-plugins/tmux-resurrect'      # Save/restore sessions across reboots
set -g @plugin 'tmux-plugins/tmux-continuum'      # Auto-save resurrect state
set -g @plugin 'tmux-plugins/tmux-yank'           # Copy to system clipboard
set -g @plugin 'tmux-plugins/tmux-cpu'            # CPU % in status bar
set -g @plugin 'tmux-plugins/tmux-battery'        # Battery % in status bar
set -g @plugin 'wfxr/tmux-fzf-url'               # Fuzzy-pick URLs in scrollback
set -g @plugin 'christoomey/vim-tmux-navigator'   # Seamless Neovim ↔ tmux pane nav

# ── Catppuccin theme config ───────────────────────────────────────────────────
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_status_modules_right "cpu battery session date_time"
set -g @catppuccin_date_time_text "%H:%M"

# ── Plugin settings ───────────────────────────────────────────────────────────
set -g @resurrect-strategy-nvim 'session'    # Restore Neovim sessions
set -g @continuum-restore 'on'               # Auto-restore on tmux start
set -g @continuum-save-interval '15'         # Save every 15 min
set -g @yank_selection_mouse 'clipboard'

# ── Initialize TPM (must be last line) ───────────────────────────────────────
run '~/.tmux/plugins/tpm/tpm'
